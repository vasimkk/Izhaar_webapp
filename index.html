<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" href="/src/assets/logo.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#9C27B0" />
  <link rel="manifest" href="/manifest.json" />
  <title>Izhaar ❤️</title>

  <!-- DNS Prefetch for external services -->
  <link rel="dns-prefetch" href="https://api.izhaarlove.com" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Preconnect for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts: load only what's needed, display=swap prevents FOIT -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700;800&family=Poppins:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- PWA install prompt -->
  <script>
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- Load Razorpay only when needed (defer) -->
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</body>

</html>
